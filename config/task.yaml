task: |
    Standard Optical Function Optimization

    Find the parameter combination that maximizes the target value.

    [Parameters]
        * x (float, -5.0~5.0): Input parameter x.
        * y (float, -5.0~5.0): Input parameter y.

    [Target] 
        - value (float) as high as possible.

    [Last Record of the Experiment]
         - Hypothesis:
            - "x=0.1, y=0.1"
         - Value: 0.05

environment:
    # We DO NOT use this UTIL LLM in the current implementation, but leave it here for potential future use.
    UTIL_LLM_CONFIG_BASE_URL: "http://api.openai.com/v1"
    UTIL_LLM_CONFIG_NAME: "gpt-5.2"
    UTIL_LLM_CONFIG_API_KEY: "sk-xxx"
    UTIL_LLM_CONFIG_TEMPERATURE: "0.0"
    UTIL_LLM_CONFIG_MAX_TOKENS: "1024"

    # Assign the LLM API for getting input features for Gaussian Process Experts.
    # However, we use the model `Qwen/Qwen3-Embedding-0.6B` locally. 
    # Emmmm....if you want to use LLM like OpenAI's models, you can config API and make minor code modifications in `pievo/word/embedding.py`. 
    EMBEDDING_MODEL_URL: "..."
    EMBEDDING_MODEL_API_KEY: "..."
    EMBEDDING_MODEL_NAME: "..."
    EMBEDDING_MODEL_DIMENSIONS: "768"